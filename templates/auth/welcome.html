<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to KidSpark - Discover Your Superpowers!</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
</head>
<body class="welcome-page">
    <div class="welcome-container">
        <div class="welcome-content">
            <div class="star-emoji">⭐</div>
            <h1>Welcome to KidSpark!</h1>
            <p class="subtitle">Discover your superpowers and unlock your learning journey!</p>
            
            <div class="button-group">
                <a href="{{ url_for('auth.register') }}" class="btn btn-start">
                    Start My Adventure! 🚀
                </a>
                <a href="{{ url_for('auth.login') }}" class="btn btn-login">
                    I Already Have Account 🔑
                </a>
            </div>
            
            <p class="age-info">For kids aged 5 to 14 years</p>
        </div>
    </div>
</body>
</html>
